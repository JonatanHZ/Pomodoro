<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pomodoro.css">
    <title>Pomodoro</title>
</head>
<body>

    <!-- 
        ESTRUTURA DE NAVEGAÇÃO
        ──────────────────────
        #viewport  → a "janela": só mostra 100vw de largura, esconde o resto (overflow: hidden)
        #slider    → o trilho: contém as duas telas lado a lado (width: 200vw)
        #tela-timer e #tela-tarefas → cada tela ocupa 100vw
        
        Navegar entre telas = mover o #slider com transform: translateX()
    -->
    <div id="viewport">
        <div id="slider">

            <!-- TELA 1: TIMER -->
            <div class="tela" id="tela-timer">
                <div id="container">
                    <h1>Pomodoro Timer</h1>

                    <div id="modos">
                        <button class="btn-modo ativo" data-modo="foco">Foco</button>
                        <button class="btn-modo" data-modo="pausa-curta">Pausa Curta</button>
                        <button class="btn-modo" data-modo="pausa-longa">Pausa Longa</button>
                    </div>

                    <p id="display">25:00</p>

                    <div id="controles">
                        <button id="btn-reset">↺</button>
                        <button id="btn-play">▶</button>
                    </div>

                    <div id="sessoes"></div>

                    <!-- Botão de navegação para as tarefas -->
                    <button class="btn-nav" id="btn-ir-tarefas">
                        Tarefas da semana →
                    </button>
                </div>
            </div>

            <!-- TELA 2: TAREFAS -->
            <div class="tela" id="tela-tarefas">
                <div id="container-tarefas">

                    <!-- Botão de voltar para o timer -->
                    <button class="btn-nav" id="btn-voltar-timer">
                        ← Voltar ao timer
                    </button>

                    <h2>Tarefas da Semana</h2>

                    <div id="semana"></div>

                </div>
            </div>

        </div>
    </div>

    <!-- Modal pra adicionar as tarefas -->
    <div id="modal-overlay" class="escondido">
        <div id="modal">
            <h3 id="modal-titulo">Adicionar tarefa</h3>
            <input type="text" id="input-nome" placeholder="Ex: Matemática" maxlength="40" />
            <div id="modal-horas-grupo">
                <label for="input-horas">Meta de horas:</label>
                <input type="number" id="input-horas" min="0.5" max="12" step="0.5" value="1" />
            </div>
            <div id="modal-botoes">
                <button id="btn-cancelar">Cancelar</button>
                <button id="btn-confirmar">Adicionar</button>
            </div>
        </div>
    </div>

    <script src="pomodoro.js"></script>
</body>
</html>
